<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabochon — Action Tracker</title>
<style>
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--border2:#ccc8c0;
  --text:#1a1916;--text2:#6b6760;--text3:#9c9890;
  --gold:#b8872a;--gold-light:#f5edd8;--gold-border:#dfc078;
  --blue:#2a5fb8;--blue-light:#eaf0fb;
  --red:#c0392b;--red-light:#fdf0ee;
  --green:#2a7a4b;--green-light:#edf7f1;
  --amber:#c07a1a;--amber-light:#fdf3e3;
  --r:8px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.logo img{width:150px;display:block}
.logo-sub{font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.nav{padding:10px;flex:1}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:14px 8px 5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);font-size:14px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--gold-light);color:var(--gold);font-weight:600}
.nav-count{margin-left:auto;font-size:12px;background:var(--surface2);color:var(--text3);padding:1px 7px;border-radius:10px;font-weight:500}
.nav-item.active .nav-count{background:var(--gold-border);color:var(--gold)}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar h1{font-size:20px;font-weight:600}
.topbar p{font-size:13px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;gap:8px}
.btn{border:1px solid var(--border2);background:var(--surface);color:var(--text);border-radius:var(--r);padding:8px 16px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.primary:hover{background:#a07520}
.btn.sm{padding:5px 11px;font-size:13px}
.btn.danger{color:var(--red);border-color:#f0c0bb}
.btn.danger:hover{background:var(--red-light)}
.btn:disabled{opacity:.5;cursor:default}
.btn.active-view{background:var(--gold-light);color:var(--gold);border-color:var(--gold-border);font-weight:600}
.content{padding:20px 28px;flex:1}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px}
.stat-n{font-size:28px;font-weight:700}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.stat-n.warn{color:var(--amber)}
.stat-n.good{color:var(--green)}

/* VIEW BAR */
.view-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filters{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.filters select,.filters input{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit}

/* GROUP HEADER */
.group-hdr{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:18px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.group-hdr span.cnt{font-weight:400;font-size:12px}

/* TASK ROW — inline editable */
.task-row{display:grid;grid-template-columns:28px 1fr 180px 140px 90px 110px 90px 90px 36px;align-items:center;gap:0;padding:6px 4px;border-radius:var(--r);border:1px solid transparent;min-height:48px}
.task-row:hover{background:var(--surface);border-color:var(--border)}
.task-row.expanded{background:var(--surface);border-color:var(--border);border-bottom-left-radius:0;border-bottom-right-radius:0}
.task-row.overdue-row{background:#fff5f5;border-color:#f5c0bb}
.task-chk{width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;background:var(--surface)}
.task-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.task-chk:hover{border-color:var(--gold)}

/* Inline edit fields */
.ie{background:transparent;border:1px solid transparent;border-radius:5px;font-family:inherit;color:var(--text);padding:4px 6px;width:100%}
.ie:hover{border-color:var(--border2);background:var(--surface)}
.ie:focus{outline:none;border-color:var(--gold);background:var(--surface);box-shadow:0 0 0 2px var(--gold-light)}
.ie-title{font-size:15px;font-weight:500;cursor:text}
.ie-title.done{text-decoration:line-through;color:var(--text3)}
.ie-select{font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:none}
.ie-date{font-size:13px;cursor:pointer}
.ie-date.overdue{color:var(--red);font-weight:600}
.ie-date.soon{color:var(--amber);font-weight:600}
.col-expand{cursor:pointer;color:var(--text3);font-size:18px;text-align:center;line-height:1;padding:4px;border-radius:4px;border:none;background:none}
.col-expand:hover{color:var(--text);background:var(--surface2)}
.progress-wrap{padding:0 6px}
.progress-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:2px}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .2s}
.progress-bar-fill.done{background:var(--green)}
.progress-label{font-size:10px;color:var(--text3);text-align:center}
.progress-input{width:100%;font-size:12px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-family:inherit;text-align:center}

/* Expanded sub-row */
.task-expand{background:var(--surface);border:1px solid var(--border);border-top:none;border-bottom-left-radius:var(--r);border-bottom-right-radius:var(--r);padding:12px 16px 14px 36px;margin-bottom:4px}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.expand-section{margin-bottom:0}
.expand-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.expand-notes{width:100%;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;min-height:60px}
.expand-notes:focus{outline:none;border-color:var(--gold);background:var(--surface)}
.history-item{padding:8px 10px;background:var(--surface2);border-radius:var(--r);margin-bottom:6px;font-size:13px}
.history-meta{font-size:11px;color:var(--text3);margin-bottom:2px;display:flex;gap:8px}
.history-tag{font-size:10px;background:var(--gold-light);color:var(--gold);padding:1px 6px;border-radius:6px;border:1px solid var(--gold-border)}
.add-update{display:flex;gap:8px;margin-top:8px}
.add-update input{flex:1;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit}
.add-update input:focus{outline:none;border-color:var(--gold)}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:14px}
.subtask-item:last-child{border-bottom:none}
.subtask-chk{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer}
.subtask-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.subtask-title.done{text-decoration:line-through;color:var(--text3)}
.add-subtask{display:flex;gap:8px;margin-top:8px}
.add-subtask input{flex:1;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit}

/* Column headers */
.col-headers{display:grid;grid-template-columns:28px 1fr 180px 140px 90px 110px 90px 90px 36px;gap:0;padding:4px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.col-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:0 6px;cursor:pointer;user-select:none}
.col-hdr:hover{color:var(--text)}
.col-hdr.sorted{color:var(--gold)}

/* Badges */
.badge{font-size:12px;padding:2px 8px;border-radius:9px;font-weight:500;display:inline-block}
.badge.high{background:#fdf0ee;color:#922b21}
.badge.low{background:var(--green-light);color:var(--green)}
.badge.project{background:var(--blue-light);color:var(--blue)}
.badge.overdue{background:var(--red-light);color:var(--red)}

/* GANTT */
.gantt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--surface)}
.gantt-header{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.gantt-label-col{width:280px;flex-shrink:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:10px 14px;border-right:1px solid var(--border)}
.gantt-timeline{flex:1;display:flex}
.gantt-month{border-right:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);padding:10px 8px;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.gantt-group{background:var(--surface2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);padding:6px 14px;border-bottom:1px solid var(--border)}
.gantt-row{display:flex;border-bottom:1px solid var(--border);align-items:center;min-height:40px}
.gantt-row:hover{background:#fafaf8}
.gantt-row-label{width:280px;flex-shrink:0;padding:8px 14px;font-size:14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;overflow:hidden}
.gantt-row-label .ie-title{font-size:14px}
.gantt-bar-area{flex:1;position:relative;height:40px}
.gantt-bar{position:absolute;height:20px;top:10px;border-radius:4px;cursor:pointer;min-width:6px;transition:opacity .1s}
.gantt-bar:hover{opacity:.8;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.gantt-bar.done{opacity:.45}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;z-index:5;pointer-events:none}
.gantt-no-date{font-size:11px;color:var(--text3);padding:0 10px;font-style:italic}
.gantt-legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;background:var(--surface);position:sticky;top:37px;z-index:9}
.gantt-legend-item{display:flex;align-items:center;gap:6px}
.gantt-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:17px;font-weight:600}
.modal-close{border:none;background:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1}
.modal-body{padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:13px}
.field label{font-size:13px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit}
.field textarea{min-height:80px;resize:vertical}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.notice{padding:10px 14px;border-radius:var(--r);font-size:14px;margin-top:10px}
.notice.success{background:var(--green-light);color:var(--green)}
.notice.warn{background:var(--amber-light);color:var(--amber)}
.notice.error{background:var(--red-light);color:var(--red)}
.notice.info{background:var(--blue-light);color:var(--blue)}
.report-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:13px;line-height:1.9;white-space:pre-wrap;font-family:'Courier New',monospace;margin-top:12px;max-height:400px;overflow-y:auto}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:15px}
</style>
</head>

async function init(){
  document.getElementById('dash-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  await Promise.all([loadPeople(),loadProjects()]);
  await loadTasks();
  populateSelects();renderNav();renderDashboard();renderTasks();
}

async function loadTasks(){try{const d=await api('tasks?select=*&order=created_at.asc');tasks=d||[];}catch(e){tasks=[];}}
async function loadPeople(){
  try{const d=await api('people?select=*&order=name.asc');people=(d||[]).map(p=>p.name);
    if(!people.length){for(const n of DEFAULT_PEOPLE)try{await api('people','POST',{name:n});}catch(e){};people=[...DEFAULT_PEOPLE];}
  }catch(e){people=[...DEFAULT_PEOPLE];}
}
async function loadProjects(){
  try{const d=await api('projects?select=*&order=name.asc');projects=(d||[]).map(p=>p.name);
    if(!projects.length){for(const n of DEFAULT_PROJECTS)try{await api('projects','POST',{name:n});}catch(e){};projects=[...DEFAULT_PROJECTS];}
  }catch(e){projects=[...DEFAULT_PROJECTS];}
}

function populateSelects(){
  const pOpts='<option value="">Unassigned</option>'+people.map(p=>`<option value="${p}">${p}</option>`).join('');
  const prOpts=projects.map(p=>`<option value="${p}">${p}</option>`).join('');
  ['new-person'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=pOpts;});
  ['new-project'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='<option value="">No project</option>'+prOpts;});
  ['filter-person'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='<option value="">All people</option>'+people.map(p=>`<option value="${p}">${p}</option>`).join('');});
  ['filter-project','minutes-project','report-project'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='<option value="">All projects</option>'+prOpts;});
}

function renderNav(){
  const open=tasks.filter(t=>!t.done).length;
  document.getElementById('count-open').textContent=open;
  const pc={};tasks.filter(t=>!t.done).forEach(t=>{if(t.project)pc[t.project]=(pc[t.project]||0)+1;});
  document.getElementById('nav-projects').innerHTML=projects.map(p=>`<button class="nav-item" onclick="filterProject('${p.replace(/'/g,"\\'")}')">📁 ${p}<span class="nav-count">${pc[p]||0}</span></button>`).join('');
  const pp={};tasks.filter(t=>!t.done).forEach(t=>{if(t.person)pp[t.person]=(pp[t.person]||0)+1;});
  document.getElementById('nav-people').innerHTML=people.slice(0,8).map(p=>`<button class="nav-item" onclick="filterPerson('${p.replace(/'/g,"\\'")}')">👤 ${p.split(' ')[0]}<span class="nav-count">${pp[p]||0}</span></button>`).join('');
}

function renderDashboard(){
  const now=new Date();now.setHours(0,0,0,0);
  const week=new Date(now);week.setDate(week.getDate()+7);
  const open=tasks.filter(t=>!t.done);
  const overdue=open.filter(t=>t.due&&new Date(t.due)<now);
  const dueWeek=open.filter(t=>t.due&&new Date(t.due)>=now&&new Date(t.due)<=week);
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-n">${tasks.length}</div><div class="stat-l">Total tasks</div></div>
    <div class="stat-card"><div class="stat-n">${open.length}</div><div class="stat-l">Open</div></div>
    <div class="stat-card"><div class="stat-n good">${tasks.filter(t=>t.done).length}</div><div class="stat-l">Done</div></div>
    <div class="stat-card"><div class="stat-n warn">${overdue.length}</div><div class="stat-l">Overdue</div></div>`;
  document.getElementById('dash-due').innerHTML=dueWeek.length?dueWeek.map(t=>dashRow(t)).join(''):'<div style="font-size:14px;color:var(--text3);padding:10px 0">Nothing due this week.</div>';
  document.getElementById('dash-overdue').innerHTML=overdue.length?overdue.map(t=>dashRow(t)).join(''):'<div style="font-size:14px;color:var(--text3);padding:10px 0">None — you\'re on top of it.</div>';
}

function dashRow(t){
  const now=new Date();now.setHours(0,0,0,0);
  const overdue=!t.done&&t.due&&new Date(t.due)<now;
  return `<div style="display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:15px">
    <div class="task-chk ${t.done?'done':''}" onclick="toggleDone('${t.id}')">${t.done?'✓':''}</div>
    <div style="flex:1">${t.title}</div>
    ${t.person?`<span style="font-size:13px;color:var(--text2)">${t.person.split(' ')[0]}</span>`:''}
    ${t.due?`<span style="font-size:13px;font-weight:500;color:${overdue?'var(--red)':'var(--amber)'}">📅 ${t.due}</span>`:''}
  </div>`;
}

function getFiltered(){
  const status=document.getElementById('filter-status')?.value||'open';
  const proj=document.getElementById('filter-project')?.value||'';
  const person=document.getElementById('filter-person')?.value||'';
  const search=(document.getElementById('filter-search')?.value||'').toLowerCase();
  return tasks.filter(t=>{
    if(status==='open'&&t.done)return false;
    if(status==='done'&&!t.done)return false;
    if(proj&&t.project!==proj)return false;
    if(person&&t.person!==person)return false;
    if(search&&!t.title.toLowerCase().includes(search)&&!(t.notes||'').toLowerCase().includes(search))return false;
    return true;
  });
}

function setView(v){
  currentView=v;
  ['category','person','gantt'].forEach(x=>{const b=document.getElementById('vbtn-'+x);if(b)b.classList.toggle('active-view',x===v);});
  renderTasks();
}

function renderTasks(){
  const list=document.getElementById('task-list');if(!list)return;
  const filtered=getFiltered();
  const sub=document.getElementById('tasks-sub');
  if(sub)sub.textContent=`${filtered.filter(t=>!t.done).length} open · ${filtered.filter(t=>t.done).length} done`;
  if(currentView==='gantt'){renderGantt(filtered,list);return;}
  if(!filtered.length){list.innerHTML='<div class="empty">No tasks match this filter.</div>';return;}

  // Column headers
  const hdrs=`<div class="col-headers">
    <div class="col-hdr"></div>
    <div class="col-hdr">Task</div>
    <div class="col-hdr">Person</div>
    <div class="col-hdr">Project</div>
    <div class="col-hdr">Priority</div>
    <div class="col-hdr">Due date</div>
    <div class="col-hdr" style="text-align:center">% Done</div>
    <div class="col-hdr">Initiated</div>
    <div class="col-hdr"></div>
  </div>`;

  let html=hdrs;
  if(currentView==='category'){
    const by={};filtered.forEach(t=>{const k=t.category||'General';if(!by[k])by[k]=[];by[k].push(t);});
    const sorted=CAT_ORDER.filter(c=>by[c]?.length).concat(Object.keys(by).filter(k=>!CAT_ORDER.includes(k)&&by[k]?.length));
    sorted.forEach(k=>{
      html+=`<div class="group-hdr"><span>${k}</span><span class="cnt">${by[k].filter(t=>!t.done).length} open</span></div>`;
      by[k].forEach(t=>{html+=taskRow(t)+expandRow(t);});
    });
  } else {
    const by={};filtered.forEach(t=>{const k=t.person||'Unassigned';if(!by[k])by[k]=[];by[k].push(t);});
    Object.entries(by).forEach(([k,ts])=>{
      html+=`<div class="group-hdr"><span>${k}</span><span class="cnt">${ts.filter(t=>!t.done).length} open</span></div>`;
      ts.forEach(t=>{html+=taskRow(t)+expandRow(t);});
    });
  }
  list.innerHTML=html;
  renderNav();
}

function taskRow(t){
  const now=new Date();now.setHours(0,0,0,0);
  const overdue=!t.done&&t.due&&new Date(t.due)<now;
  const soon=!t.done&&t.due&&!overdue&&new Date(t.due)<=new Date(now.getTime()+7*86400000);
  const pOpts=people.map(p=>`<option value="${p}"${t.person===p?' selected':''}>${p}</option>`).join('');
  const prOpts=projects.map(p=>`<option value="${p}"${t.project===p?' selected':''}>${p}</option>`).join('');
  const isExp=expandedId===t.id;
  // Days on radar
  const initDate=t.initiated_date?new Date(t.initiated_date):new Date(t.created_at||now);
  const daysOn=Math.floor((now-initDate)/86400000);
  const daysLabel=daysOn<=0?'today':daysOn===1?'1 day':`${daysOn}d`;
  const daysColor=daysOn>90?'var(--red)':daysOn>30?'var(--amber)':'var(--text3)';
  return `<div class="task-row${isExp?' expanded':''}${overdue?' overdue-row':''}" id="tr-${t.id}">
    <div class="task-chk ${t.done?'done':''}" onclick="toggleDone('${t.id}')">${t.done?'✓':''}</div>
    <input class="ie ie-title${t.done?' done':''}" value="${t.title.replace(/"/g,'&quot;')}" onblur="saveField('${t.id}','title',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
    <select class="ie ie-select" onchange="saveField('${t.id}','person',this.value)">
      <option value="">Unassigned</option>${pOpts}
    </select>
    <select class="ie ie-select" onchange="saveField('${t.id}','project',this.value)">
      <option value="">No project</option>${prOpts}
    </select>
    <select class="ie ie-select" onchange="saveField('${t.id}','priority',this.value)">
      <option value="high"${t.priority==='high'?' selected':''}>High</option>
      <option value="low"${t.priority==='low'?' selected':''}>Low</option>
    </select>
    <input type="date" class="ie ie-date${overdue?' overdue':soon?' soon':''}" value="${t.due||''}" onchange="saveField('${t.id}','due',this.value)">
    <div class="progress-wrap" onclick="event.stopPropagation()">
      <div class="progress-bar-bg"><div class="progress-bar-fill${t.done?' done':''}" style="width:${t.done?100:(t.progress||0)}%"></div></div>
      <div class="progress-label">${t.done?'100':t.progress||0}%</div>
    </div>
    <div style="padding:0 6px;cursor:default" onclick="event.stopPropagation()">
      <div style="font-size:12px;color:var(--text2)">${initDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'})}</div>
      <div style="font-size:11px;color:${daysColor};font-weight:500">${daysLabel}</div>
    </div>
    <button class="col-expand" onclick="toggleExpand('${t.id}')" title="Notes, subtasks, history">${isExp?'▲':'▼'}</button>
  </div>`;
}

  return `<div class="task-expand" id="exp-${t.id}">
    <div class="expand-grid">
      <div>
        <div class="expand-label">Notes</div>
        <textarea class="expand-notes" onblur="saveField('${t.id}','notes',this.value)" placeholder="Add context, links...">${t.notes||''}</textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <select class="ie ie-select" style="flex:1" onchange="saveField('${t.id}','category',this.value)">
            <option value="">No category</option>
            ${['General','Finance','Banking','HR','Operations','Sales','Legal'].map(c=>`<option${t.category===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <div style="flex:1">
            <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Start date</div>
            <input type="date" class="ie ie-date" value="${t.start_date||''}" onchange="saveField('${t.id}','start_date',this.value)" style="width:100%">
          </div>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Initiated</div>
            <input type="date" class="ie ie-date" value="${t.initiated_date||t.created_at?.split('T')[0]||''}" onchange="saveField('${t.id}','initiated_date',this.value)" style="width:100%">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:flex-end">
          <div style="flex:1">
            <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Duration (days)</div>
            <input type="number" min="1" max="365" placeholder="e.g. 14" class="ie" id="dur-${t.id}" value="" 
              style="width:100%;font-size:13px" 
              onchange="setDueFromDuration('${t.id}',this.value)"
              title="Enter number of days from start → auto-sets due date">
          </div>
          <div style="flex:1;font-size:12px;color:var(--text3);padding-bottom:6px">
            → fills due date automatically
          </div>
        </div>
        <div style="margin-top:12px">
          <div class="expand-label">% Complete</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
            <input type="range" min="0" max="100" step="5" value="${t.done?100:(t.progress||0)}" 
              style="flex:1;accent-color:var(--gold)" 
              oninput="this.nextElementSibling.textContent=this.value+'%'"
              onchange="saveField('${t.id}','progress',parseInt(this.value))">
            <span style="font-size:14px;font-weight:600;color:var(--gold);min-width:40px">${t.done?'100':(t.progress||0)}%</span>
          </div>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn sm danger" onclick="deleteTask('${t.id}')">Delete task</button>
        </div>
      </div>
      <div>
        <div class="expand-label">Subtasks</div>
        <div id="sub-${t.id}"></div>
        <div class="add-subtask">
          <input type="text" id="si-${t.id}" placeholder="Add subtask..." onkeydown="if(event.key==='Enter')addSubtask('${t.id}')">
          <button class="btn sm primary" onclick="addSubtask('${t.id}')">Add</button>
        </div>
        <div class="expand-label" style="margin-top:14px">Updates</div>
        <div id="hist-${t.id}"></div>
        <div class="add-update">
          <input type="text" id="ui-${t.id}" placeholder="Add update..." onkeydown="if(event.key==='Enter')addUpdate('${t.id}')">
          <button class="btn sm primary" onclick="addUpdate('${t.id}')">Add</button>
        </div>
      </div>
    </div>
  </div>`;
}

async function toggleExpand(id){
  if(expandedId===id){expandedId=null;renderTasks();return;}
  expandedId=id;
  renderTasks();
  await Promise.all([loadSubtasks(id),loadHistory(id)]);
}

async function setDueFromDuration(id, days){
  if(!days||days<1)return;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const base=t.start_date?new Date(t.start_date):new Date();
  base.setDate(base.getDate()+parseInt(days));
  const due=base.toISOString().split('T')[0];
  // Update the due date input in the row
  const row=document.getElementById('tr-'+id);
  if(row){const inp=row.querySelector('input[type=date]');if(inp)inp.value=due;}
  await saveField(id,'due',due);
}

  t[field]=value||null;
  try{await api(`tasks?id=eq.${id}`,'PATCH',{[field]:value||null,updated_at:new Date().toISOString()});}
  catch(e){console.error(e);}
  if(field!=='notes'&&field!=='start_date'&&field!=='initiated_date')renderTasks();
  renderDashboard();renderNav();
}

async function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  try{await api(`tasks?id=eq.${id}`,'PATCH',{done:t.done,updated_at:new Date().toISOString()});}
  catch(e){t.done=!t.done;}
  renderTasks();renderDashboard();renderNav();
}

async function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  try{await api(`tasks?id=eq.${id}`,'DELETE');tasks=tasks.filter(x=>x.id!==id);expandedId=null;renderTasks();renderDashboard();renderNav();}
  catch(e){alert('Error: '+e.message);}
}

async function loadSubtasks(taskId){
  const el=document.getElementById('sub-'+taskId);if(!el)return;
  try{
    const s=await api(`task_history?task_id=eq.${taskId}&note=like.SUBTASK:*&order=created_at.asc`);
    if(!s||!s.length){el.innerHTML='<div style="font-size:13px;color:var(--text3);padding:4px 0">No subtasks yet.</div>';return;}
    el.innerHTML=s.map(x=>{
      const done=x.status_change==='subtask-done';
      const title=x.note.replace(/^SUBTASK:/,'');
      return `<div class="subtask-item">
        <div class="subtask-chk ${done?'done':''}" onclick="toggleSubtask('${x.id}','${taskId}',${done})">${done?'✓':''}</div>
        <span class="subtask-title ${done?'done':''}" style="flex:1;font-size:14px">${title}</span>
        <button style="border:none;background:none;cursor:pointer;color:var(--text3);font-size:15px" onclick="deleteSubtask('${x.id}','${taskId}')">×</button>
      </div>`;
    }).join('');
  }catch(e){}
}

async function addSubtask(taskId){
  const input=document.getElementById('si-'+taskId);
  const title=input?.value.trim();if(!title)return;
  try{await api('task_history','POST',{task_id:taskId,author:'',note:'SUBTASK:'+title,status_change:'subtask-open'});input.value='';await loadSubtasks(taskId);}
  catch(e){}
}

async function toggleSubtask(histId,taskId,wasDone){
  try{await api(`task_history?id=eq.${histId}`,'PATCH',{status_change:wasDone?'subtask-open':'subtask-done'});await loadSubtasks(taskId);}catch(e){}
}

async function deleteSubtask(histId,taskId){
  try{await api(`task_history?id=eq.${histId}`,'DELETE');await loadSubtasks(taskId);}catch(e){}
}

async function loadHistory(taskId){
  const el=document.getElementById('hist-'+taskId);if(!el)return;
  try{
    const h=await api(`task_history?task_id=eq.${taskId}&note=not.like.SUBTASK:*&order=created_at.asc`);
    if(!h||!h.length){el.innerHTML='<div style="font-size:13px;color:var(--text3);padding:4px 0">No updates yet.</div>';return;}
    el.innerHTML=h.map(x=>`<div class="history-item">
      <div class="history-meta"><span>${x.author||'Team'}</span><span>·</span><span>${new Date(x.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>
      <div>${x.note}</div></div>`).join('');
  }catch(e){}
}

async function addUpdate(taskId){
  const input=document.getElementById('ui-'+taskId);
  const note=input?.value.trim();if(!note)return;
  try{await api('task_history','POST',{task_id:taskId,author:'Team',note});input.value='';await loadHistory(taskId);}
  catch(e){}
}

// GANTT
function getPersonColor(person){
  if(!person)return '#aab8d0';
  const idx=people.indexOf(person);
  return PERSON_COLORS[idx>=0?idx%PERSON_COLORS.length:9];
}

function renderGantt(filtered,list){
  const hasDue=filtered.filter(t=>t.due);
  if(!hasDue.length){list.innerHTML='<div class="empty">No tasks with due dates to show in Gantt view.</div>';return;}
  const today=new Date();today.setHours(0,0,0,0);
  const minD=new Date(today.getFullYear(),today.getMonth(),1);
  const maxD=new Date(today.getTime()+90*86400000);
  maxD.setMonth(maxD.getMonth()+1);maxD.setDate(0);
  const totalDays=(maxD-minD)/86400000+1;
  const todayPct=((today-minD)/86400000/totalDays*100).toFixed(2);
  const months=[];let cur=new Date(minD);
  while(cur<=maxD){
    const start=new Date(cur);
    const end=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    const clampEnd=end>maxD?maxD:end;
    const days=(clampEnd-start)/86400000+1;
    months.push({label:start.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),pct:(days/totalDays*100).toFixed(2)});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }
  const peopleWithDates=[...new Set(hasDue.map(t=>t.person).filter(Boolean))];
  const legend=peopleWithDates.map(p=>`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${getPersonColor(p)}"></div><span>${p.split(' ').slice(0,2).join(' ')}</span></div>`).join('');
  const by={};filtered.forEach(t=>{const k=t.category||'General';if(!by[k])by[k]=[];by[k].push(t);});
  const catsSorted=CAT_ORDER.filter(c=>by[c]?.length).concat(Object.keys(by).filter(k=>!CAT_ORDER.includes(k)&&by[k]?.length));
  let rows='';
  catsSorted.forEach(cat=>{
    rows+=`<div class="gantt-group">${cat}</div>`;
    by[cat].forEach(t=>{
      const pOpts=people.map(p=>`<option value="${p}"${t.person===p?' selected':''}>${p}</option>`).join('');
      const endD=t.due?new Date(t.due):null;
      const startD=t.start_date?new Date(t.start_date):endD;
      const barLeft=startD?((startD-minD)/86400000/totalDays*100):null;
      const barWidth=startD&&endD?Math.max(((endD-startD)/86400000+1)/totalDays*100,1):1;
      const color=t.done?'#aab8d0':getPersonColor(t.person);
      rows+=`<div class="gantt-row">
        <div class="gantt-row-label">
          <div class="task-chk ${t.done?'done':''}" onclick="toggleDone('${t.id}')" style="flex-shrink:0">${t.done?'✓':''}</div>
          <input class="ie ie-title${t.done?' done':''}" style="font-size:14px" value="${t.title.replace(/"/g,'&quot;')}" onblur="saveField('${t.id}','title',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        </div>
        <div class="gantt-bar-area">
          <div class="gantt-today-line" style="left:${todayPct}%;background:var(--red);opacity:.4"></div>
          ${barLeft!==null?`<div class="gantt-bar${t.done?' done':''}" 
            style="left:${Math.max(0,barLeft).toFixed(2)}%;width:${barWidth.toFixed(2)}%;background:${color}"
            title="${t.title} | ${t.start_date||t.due} → ${t.due||''}${t.person?' | '+t.person:''}"></div>`
            :`<span class="gantt-no-date">no date set</span>`}
        </div>
      </div>`;
    });
  });
  list.innerHTML=`<div class="gantt-wrap">
    <div class="gantt-header">
      <div class="gantt-label-col">Task</div>
      <div class="gantt-timeline">${months.map(m=>`<div class="gantt-month" style="flex:${m.pct} 0 0%">${m.label}</div>`).join('')}</div>
    </div>
    ${legend?`<div class="gantt-legend">${legend}</div>`:''}
    ${rows}
  </div>`;
}

function calcNewDue(){
  const days=parseInt(document.getElementById('new-duration').value);
  if(!days||days<1)return;
  const start=document.getElementById('new-start').value;
  const base=start?new Date(start):new Date();
  base.setDate(base.getDate()+days);
  document.getElementById('new-due').value=base.toISOString().split('T')[0];
}

async function addTask(){
  const title=document.getElementById('new-title').value.trim();if(!title)return;
  try{
    const body={title,person:document.getElementById('new-person').value||null,project:document.getElementById('new-project').value||null,priority:document.getElementById('new-priority').value,due:document.getElementById('new-due').value||null,start_date:document.getElementById('new-start').value||null,initiated_date:document.getElementById('new-initiated').value||new Date().toISOString().split('T')[0],notes:document.getElementById('new-notes').value.trim()||null,category:document.getElementById('new-category').value||null,done:false};
    const r=await api('tasks','POST',body);if(r&&r[0])tasks.push(r[0]);
    closeModal('add-modal');
    ['new-title','new-notes','new-due','new-start','new-initiated','new-duration'].forEach(id=>document.getElementById(id).value='');
    renderTasks();renderDashboard();renderNav();
  }catch(e){alert('Error: '+e.message);}
}

async function extractMinutes(){
  const text=document.getElementById('minutes-text').value.trim();if(!text)return;
  const defProj=document.getElementById('minutes-project').value;
  const notice=document.getElementById('minutes-notice');
  const btn=document.getElementById('minutes-btn');
  btn.disabled=true;btn.textContent='Extracting...';
  notice.innerHTML='<div class="notice info">Reading your meeting notes...</div>';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        messages:[{role:'user',content:`Extract all action items from these meeting notes. Return ONLY a JSON array with keys: title, person (match to one of: ${people.join(', ')}; null if no match), priority ("high" or "low"), due (YYYY-MM-DD or null), notes (brief context or null), category (General/Finance/Banking/HR/Operations/Sales/Legal or null).\n\nMeeting notes:\n${text}\n\nReturn only the JSON array, no markdown.`}]})});
    const data=await resp.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'[]';
    let items;try{items=JSON.parse(raw.replace(/```json|```/g,''));}catch(e){items=[];}
    if(!items.length){notice.innerHTML='<div class="notice warn">No action items found.</div>';btn.disabled=false;btn.textContent='✦ Extract actions';return;}
    let added=0;
    for(const item of items){
      try{const r=await api('tasks','POST',{title:item.title,person:item.person||null,project:defProj||null,priority:item.priority||'high',due:item.due||null,notes:item.notes||null,category:item.category||null,done:false});if(r&&r[0]){tasks.push(r[0]);added++;}}catch(e){}
    }
    notice.innerHTML=`<div class="notice success">✓ Added ${added} action item${added!==1?'s':''}.</div>`;
    renderTasks();renderDashboard();renderNav();
    setTimeout(()=>closeModal('minutes-modal'),1500);
  }catch(e){notice.innerHTML=`<div class="notice error">Error: ${e.message}</div>`;}
  btn.disabled=false;btn.textContent='✦ Extract actions';
}

function generateReport(){
  const proj=document.getElementById('report-project').value;
  const filter=document.getElementById('report-filter').value;
  const date=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const label=proj||'All Projects';
  let items=tasks.filter(t=>{if(proj&&t.project!==proj)return false;if(filter==='open'&&t.done)return false;if(filter==='done'&&!t.done)return false;return true;});
  const cats={General:[],Legal:[],Finance:[],Banking:[],HR:[],Operations:[],Sales:[]};
  items.forEach(t=>{const c=t.category&&cats[t.category]?t.category:'General';cats[c].push(t);});
  const lines=[`ACTION ITEMS — ${label.toUpperCase()}\n${date}\n${'─'.repeat(44)}`];
  for(const [cat,ts] of Object.entries(cats)){
    const open=ts.filter(t=>!t.done);const done=ts.filter(t=>t.done);
    if(!open.length&&(filter==='open'||!done.length))continue;
    lines.push(`\n${cat.toUpperCase()}\n`);
    open.forEach(t=>{lines.push(`[ ] ${t.title}`);const d=[];if(t.person)d.push(`→ ${t.person}`);if(t.due)d.push(`Due: ${t.due}`);if(d.length)lines.push(`    ${d.join('  ')}`);if(t.notes)lines.push(`    ${t.notes}`);});
    if(filter!=='open')done.forEach(t=>lines.push(`[x] ${t.title}${t.person?' — '+t.person:''}`));
  }
  const openCount=items.filter(t=>!t.done).length;
  lines.push(`\n${'─'.repeat(44)}\n${openCount} open · ${items.filter(t=>t.done).length} completed`);
  const report=lines.join('\n');
  document.getElementById('report-output').innerHTML=`<div class="report-box">${report}</div>`;
  document.getElementById('copy-btn').style.display='';
  document.getElementById('email-btn').style.display='';
  window._lastReport={report,label};
}

function copyReport(){const el=document.querySelector('.report-box');if(el)navigator.clipboard.writeText(el.textContent).then(()=>alert('Copied!'));}
function draftEmail(){if(window._lastReport)alert('Paste your report into Claude and ask to draft the email.');}

async function generateBrief(){
  const btn=document.getElementById('brief-btn');btn.disabled=true;btn.textContent='Generating...';
  const out=document.getElementById('brief-output');
  out.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">Scanning tracker...</div>';
  try{
    const now=new Date();now.setHours(0,0,0,0);
    const week=new Date(now);week.setDate(week.getDate()+7);
    const overdue=tasks.filter(t=>!t.done&&t.due&&new Date(t.due)<now);
    const dueWeek=tasks.filter(t=>!t.done&&t.due&&new Date(t.due)>=now&&new Date(t.due)<=week);
    const noOwner=tasks.filter(t=>!t.done&&!t.person);
    const summary=`Open: ${tasks.filter(t=>!t.done).length}. Overdue: ${overdue.length}. Due this week: ${dueWeek.length}. Unassigned: ${noOwner.length}.\n\nOVERDUE:\n${overdue.map(t=>`- ${t.title} (${t.person||'unassigned'}, due ${t.due})`).join('\n')||'None'}\n\nDUE THIS WEEK:\n${dueWeek.map(t=>`- ${t.title} (${t.person||'unassigned'}, due ${t.due})`).join('\n')||'None'}`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        messages:[{role:'user',content:`You are Josh Post's COO assistant. Write a concise morning brief from this tracker snapshot. Direct and prioritized.\n\n${summary}\n\nToday: ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}.`}]})});
    const data=await resp.json();
    const brief=data.content?.find(c=>c.type==='text')?.text||'Could not generate.';
    out.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;max-width:800px">
      <div style="font-size:14px;font-weight:600;color:var(--gold);margin-bottom:12px">☀ ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      <div style="font-size:15px;line-height:1.8;white-space:pre-wrap">${brief}</div></div>`;
  }catch(e){out.innerHTML=`<div class="notice error">Error: ${e.message}</div>`;}
  btn.disabled=false;btn.textContent='Regenerate';
}

function showPage(p){
  ['dashboard','tasks','brief'].forEach(x=>{const el=document.getElementById('page-'+x);if(el)el.style.display=x===p?'flex':'none';});
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+p);if(nav)nav.classList.add('active');
}

function filterProject(p){showPage('tasks');document.getElementById('tasks-title').textContent=p;document.getElementById('filter-project').value=p;renderTasks();}
function filterPerson(p){showPage('tasks');document.getElementById('tasks-title').textContent=p;document.getElementById('filter-person').value=p;renderTasks();}
function openModal(id){populateSelects();document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openAddTask(){openModal('add-modal');}

init();
</script>
